{% extends 'lab/base.html' %}
{% block title %}New Insurance Claim{% endblock %}
{% block content %}
<div class="page-header">
  <h1 class="page-title">🏥 New Insurance Claim</h1>
  <a href="{% url 'booking_detail' booking.pk %}" class="btn btn-outline">← Back to Booking</a>
</div>

<div class="card" style="max-width:600px">
  <div class="card-header"><span class="card-title">{{ booking.receipt_id }} — {{ booking.patient.full_name }}</span></div>
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      <div class="form-group"><label>Insurance Company *</label>
        <select name="insurance_co" class="form-control">
          <option value="">— Select —</option>
          {% for co in companies %}
          <option value="{{ co.pk }}">{{ co.name }}{% if co.tpa_name %} (TPA: {{ co.tpa_name }}){% endif %}</option>
          {% endfor %}
        </select>
        <small style="color:var(--txt3)">Company not listed? <a href="{% url 'insurance_companies' %}">Add it here</a></small>
      </div>
      <div class="form-group"><label>Policy Number</label>
        <input type="text" name="policy_number" class="form-control" placeholder="POL-XXXXXXX"></div>
      <div class="form-group"><label>Member ID</label>
        <input type="text" name="member_id" class="form-control"></div>
      <div class="form-group"><label>Claim Amount (₹)</label>
        <input type="number" name="claim_amount" class="form-control" value="{{ booking.total }}" step="0.01"></div>
      <button class="btn btn-primary mt-2">Create Claim</button>
    </form>
  </div>
</div>
{% endblock %}
