<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Pro Suite — Access Required</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#1c2128;--border:#30363d;--border2:#444c56;--teal:#00b8a9;--teal-d:#009688;--blue:#388bfd;--red:#f85149;--txt:#e6edf3;--txt2:#8b949e;--txt3:#484f58;--purple:#a371f7;--font:'Inter',system-ui,sans-serif;--display:'Rajdhani',sans-serif;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font);background:var(--bg);color:var(--txt);min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 30%,rgba(163,113,247,.06) 0%,transparent 60%);pointer-events:none;}
.grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(48,54,61,.3) 1px,transparent 1px),linear-gradient(90deg,rgba(48,54,61,.3) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;}
.card{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:40px 36px;width:400px;max-width:94vw;box-shadow:0 24px 60px rgba(0,0,0,.6);text-align:center;position:relative;z-index:1;}
.lock-icon{width:64px;height:64px;border-radius:16px;background:rgba(163,113,247,.1);border:1px solid rgba(163,113,247,.2);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;}
.lock-icon svg{width:28px;height:28px;color:var(--purple);}
.title{font-family:var(--display);font-size:22px;font-weight:700;color:var(--txt);margin-bottom:4px;}
.subtitle{font-size:12px;color:var(--txt2);margin-bottom:28px;}
.badge{display:inline-flex;align-items:center;gap:5px;background:rgba(163,113,247,.08);border:1px solid rgba(163,113,247,.2);padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;color:var(--purple);margin-bottom:20px;}
.fg{margin-bottom:16px;text-align:left;}
.fl{display:block;font-size:11px;font-weight:600;color:var(--txt2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px;}
.fc{width:100%;padding:10px 14px;background:var(--bg3);border:1.5px solid var(--border2);border-radius:8px;font-family:var(--font);font-size:15px;color:var(--txt);outline:none;transition:border .2s;letter-spacing:2px;text-align:center;}
.fc:focus{border-color:var(--purple);}
.btn{width:100%;padding:10px;background:var(--purple);border:none;border-radius:8px;font-family:var(--font);font-size:13px;font-weight:700;color:#fff;cursor:pointer;transition:all .15s;}
.btn:hover{filter:brightness(1.1);}
.error{background:rgba(248,81,73,.08);border:1px solid rgba(248,81,73,.2);border-radius:6px;padding:8px 12px;font-size:12px;color:var(--red);margin-bottom:14px;}
.back{display:block;margin-top:16px;font-size:11px;color:var(--txt3);text-decoration:none;transition:color .15s;}
.back:hover{color:var(--teal);}
.features{margin-top:24px;padding-top:20px;border-top:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr;gap:8px;text-align:left;}
.feat{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--txt3);}
.feat svg{width:12px;height:12px;color:var(--purple);flex-shrink:0;}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="card">
  <div class="lock-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
  </div>
  <div class="badge">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:10px;height:10px"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    Pro Suite
  </div>
  <div class="title">Access Required</div>
  <div class="subtitle">Enter your Pro Suite PIN to continue</div>

  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    <input type="hidden" name="next" value="{{ next }}">
    <div class="fg">
      <label class="fl">PIN</label>
      <input type="password" name="pin" class="fc" placeholder="••••••••" autofocus autocomplete="off" maxlength="20">
    </div>
    <button type="submit" class="btn">Unlock Pro Suite →</button>
  </form>

  <a href="{% url 'dashboard' %}" class="back">← Back to Dashboard</a>

  <div class="features">
    <div class="feat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>PayTrack</div>
    <div class="feat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>Claim Manager</div>
    <div class="feat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>ConnectBridge</div>
    <div class="feat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Revenue</div>
    <div class="feat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>Inventory</div>
    <div class="feat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/></svg>QC Log</div>
  </div>
</div>
</body>
</html>
